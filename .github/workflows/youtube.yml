name: Scrape YouTube Channel Data

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "YouTube channel/handle/URL (example: @MrBeast or https://youtube.com/@MrBeast)"
        required: true
        type: string

jobs:
  scrape:
    name: Extract URLs, metadata, thumbnails
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp

      - name: Normalize channel input
        id: normalize
        shell: bash
        run: |
          RAW='${{ inputs.channel }}'
          CLEAN="$(printf '%s' "$RAW" | tr -d '[:space:]')"

          if echo "$CLEAN" | grep -Eq '^https?://'; then
            URL="$CLEAN"
          else
            if echo "$CLEAN" | grep -Eq '^UC[0-9A-Za-z_-]{20,}$'; then
              URL="https://www.youtube.com/channel/$CLEAN"
            else
              if echo "$CLEAN" | grep -Eq '^@'; then
                URL="https://www.youtube.com/$CLEAN"
              else
                URL="https://www.youtube.com/@$CLEAN"
              fi
            fi
          fi

          SAFE="$(echo "$URL" | sed 's#https\?://##' | sed 's#[^A-Za-z0-9._-]#_#g')"

          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "safe=$SAFE" >> $GITHUB_OUTPUT

      - name: Create output directories
        run: |
          mkdir -p outputs
          mkdir -p outputs/thumbnails

      # 1️⃣ Fast URL extraction
      - name: Extract video URLs
        run: |
          yt-dlp \
            --flat-playlist \
            --skip-download \
            --print "%(webpage_url)s" \
            "${{ steps.normalize.outputs.url }}" \
            > outputs/${{ steps.normalize.outputs.safe }}_video_urls.txt

      # 2️⃣ Full metadata JSON (one JSON per line)
      - name: Extract metadata JSON
        run: |
          yt-dlp \
            -j \
            "${{ steps.normalize.outputs.url }}" \
            > outputs/${{ steps.normalize.outputs.safe }}_metadata.json

      # 3️⃣ Download thumbnails + info json per video
      - name: Download thumbnails and per-video metadata
        run: |
          yt-dlp \
            --skip-download \
            --write-thumbnail \
            --convert-thumbnails jpg \
            --write-info-json \
            -o "outputs/thumbnails/%(id)s.%(ext)s" \
            "${{ steps.normalize.outputs.url }}"

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add outputs || true

          if git diff --cached --quiet; then
            echo "No new files"
            exit 0
          fi

          git commit -m "Add YouTube scrape for ${{ inputs.channel }}"
          git push

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-scrape-${{ inputs.channel }}
          path: outputs
          retention-days: 7
