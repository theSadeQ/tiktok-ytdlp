name: Scrape TikTok Video IDs

on:
  workflow_dispatch:
    inputs:
      username:
        description: "TikTok username, for example: khaby.lame, @khaby.lame, or https://www.tiktok.com/@khaby.lame"
        required: true
        type: string

jobs:
  scrape:
    name: Extract TikTok video IDs
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade -r requirements.txt

      - name: Extract video IDs
        env:
          TARGET_USER: ${{ inputs.username }}
        run: |
          set -euo pipefail

          # Normalize input.
          # Accepts:
          #   khaby.lame
          #   @khaby.lame
          #   https://www.tiktok.com/@khaby.lame
          FORMATTED_USER="$(printf '%s' "$TARGET_USER" \
            | sed 's#https://www.tiktok.com/@##' \
            | sed 's#http://www.tiktok.com/@##' \
            | sed 's#https://tiktok.com/@##' \
            | sed 's#http://tiktok.com/@##' \
            | sed 's#/$##' \
            | sed 's/^@//')"

          if [ -z "$FORMATTED_USER" ]; then
            echo "Error: username is empty after normalization."
            exit 1
          fi

          OUTPUT_FILE="${FORMATTED_USER}_video_ids.txt"
          PROFILE_URL="https://www.tiktok.com/@${FORMATTED_USER}"

          echo "Extracting public video IDs from: $PROFILE_URL"

          # --flat-playlist avoids downloading videos or fetching full metadata.
          # --print id outputs only the video IDs.
          yt-dlp --flat-playlist --print id "$PROFILE_URL" > "$OUTPUT_FILE"

          echo "Extraction complete."
          echo "Output file: $OUTPUT_FILE"
          echo "Number of IDs found:"
          wc -l "$OUTPUT_FILE"

      - name: Upload video IDs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-video-ids
          path: "*_video_ids.txt"
          retention-days: 7
