name: Scrape TikTok Videos With Metadata

on:
  workflow_dispatch:
    inputs:
      username:
        description: "TikTok username, for example: khaby.lame, @khaby.lame, or https://www.tiktok.com/@khaby.lame"
        required: true
        type: string

jobs:
  scrape:
    name: Extract TikTok video IDs, URLs, and metadata
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yt-dlp
        shell: bash
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip
          python -m pip install --upgrade yt-dlp

          echo "Installed yt-dlp version:"
          python -m yt_dlp --version

      - name: Extract TikTok video data
        id: extract
        shell: bash
        run: |
          set -euo pipefail

          RAW_INPUT='${{ inputs.username }}'

          USERNAME="$(printf '%s' "$RAW_INPUT" \
            | sed -E 's#https?://(www\.)?tiktok\.com/@##' \
            | sed -E 's#/.*$##' \
            | sed 's#^@##' \
            | sed 's#/$##')"

          if [ -z "$USERNAME" ]; then
            echo "Error: username is empty after normalization."
            exit 1
          fi

          PROFILE_URL="https://www.tiktok.com/@${USERNAME}"

          OUTPUT_DIR="outputs"
          IDS_FILE="${OUTPUT_DIR}/${USERNAME}_video_ids.txt"
          URLS_FILE="${OUTPUT_DIR}/${USERNAME}_video_urls.txt"
          METADATA_FILE="${OUTPUT_DIR}/${USERNAME}_metadata.jsonl"

          mkdir -p "$OUTPUT_DIR"

          echo "Raw input: $RAW_INPUT"
          echo "Normalized username: $USERNAME"
          echo "Profile URL: $PROFILE_URL"
          echo "IDs file: $IDS_FILE"
          echo "URLs file: $URLS_FILE"
          echo "Metadata file: $METADATA_FILE"

          echo "Extracting video IDs..."

          python -m yt_dlp \
            --flat-playlist \
            --print id \
            "$PROFILE_URL" \
            > "$IDS_FILE"

          if [ ! -s "$IDS_FILE" ]; then
            echo "Error: No video IDs were extracted."
            exit 1
          fi

          echo "Creating full video URLs..."

          sed "s#^#https://www.tiktok.com/@${USERNAME}/video/#" "$IDS_FILE" > "$URLS_FILE"

          echo "Extracting full metadata for each video..."

          python -m yt_dlp \
            --dump-json \
            "$PROFILE_URL" \
            > "$METADATA_FILE"

          if [ ! -s "$METADATA_FILE" ]; then
            echo "Error: No metadata was extracted."
            exit 1
          fi

          ID_COUNT="$(wc -l < "$IDS_FILE" | tr -d ' ')"
          META_COUNT="$(wc -l < "$METADATA_FILE" | tr -d ' ')"

          echo "Extracted $ID_COUNT video IDs."
          echo "Extracted $META_COUNT metadata records."

          echo "username=$USERNAME" >> "$GITHUB_OUTPUT"
          echo "ids_file=$IDS_FILE" >> "$GITHUB_OUTPUT"
          echo "urls_file=$URLS_FILE" >> "$GITHUB_OUTPUT"
          echo "metadata_file=$METADATA_FILE" >> "$GITHUB_OUTPUT"

      - name: Commit and push output files
        shell: bash
        run: |
          set -euo pipefail

          USERNAME="${{ steps.extract.outputs.username }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add outputs/

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Add TikTok video metadata for ${USERNAME}"
          git push

      - name: Upload output files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-video-data-${{ steps.extract.outputs.username }}
          path: |
            ${{ steps.extract.outputs.ids_file }}
            ${{ steps.extract.outputs.urls_file }}
            ${{ steps.extract.outputs.metadata_file }}
          retention-days: 7
