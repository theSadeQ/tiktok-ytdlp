name: Scrape TikTok Video deatail IDs

on:
  workflow_dispatch:
    inputs:
      username:
        description: "TikTok username, for example: khaby.lame, @khaby.lame, or https://www.tiktok.com/@khaby.lame"
        required: true
        type: string

jobs:
  scrape:
    name: Extract TikTok video IDs
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip
          python -m pip install --upgrade yt-dlp

          echo "yt-dlp version:"
          python -m yt_dlp --version

      - name: Extract video URLs
        id: extract
        shell: bash
        run: |
          set -euo pipefail

          RAW_INPUT='${{ inputs.username }}'

          USERNAME="$(printf '%s' "$RAW_INPUT" \
            | sed -E 's#https?://(www\.)?tiktok\.com/@##' \
            | sed -E 's#/.*$##' \
            | sed 's#^@##' \
            | sed 's#/$##')"

          if [ -z "$USERNAME" ]; then
            echo "Error: username is empty after normalization."
            exit 1
          fi

          PROFILE_URL="https://www.tiktok.com/@${USERNAME}"
          OUTPUT_DIR="outputs"
          OUTPUT_FILE="${OUTPUT_DIR}/${USERNAME}_video_urls.txt"
          TEMP_IDS_FILE="$(mktemp)"

          mkdir -p "$OUTPUT_DIR"

          echo "Raw input: $RAW_INPUT"
          echo "Normalized username: $USERNAME"
          echo "Profile URL: $PROFILE_URL"
          echo "Output file: $OUTPUT_FILE"

          python -m yt_dlp \
            --flat-playlist \
            --print id \
            "$PROFILE_URL" \
            > "$TEMP_IDS_FILE"

          if [ ! -s "$TEMP_IDS_FILE" ]; then
            echo "Error: No video IDs were extracted."
            rm -f "$TEMP_IDS_FILE"
            exit 1
          fi

          sed "s#^#https://www.tiktok.com/@${USERNAME}/video/#" "$TEMP_IDS_FILE" > "$OUTPUT_FILE"

          URL_COUNT="$(wc -l < "$OUTPUT_FILE" | tr -d ' ')"
          echo "Extracted $URL_COUNT video URLs."

          rm -f "$TEMP_IDS_FILE"

          echo "username=$USERNAME" >> "$GITHUB_OUTPUT"
          echo "output_file=$OUTPUT_FILE" >> "$GITHUB_OUTPUT"

      - name: Commit and push output file to repository
        shell: bash
        run: |
          set -euo pipefail

          OUTPUT_FILE="${{ steps.extract.outputs.output_file }}"
          USERNAME="${{ steps.extract.outputs.username }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$OUTPUT_FILE"

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Add TikTok video URLs for ${USERNAME}"
          git push

      - name: Upload output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-video-urls-${{ steps.extract.outputs.username }}
          path: ${{ steps.extract.outputs.output_file }}
          retention-days: 7
