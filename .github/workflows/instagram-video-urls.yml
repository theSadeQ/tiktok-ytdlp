name: Scrape Instagram Video URLs

on:
  workflow_dispatch:
    inputs:
      usernames:
        description: "Comma-separated Instagram usernames. Example: user1,user2,@user3,https://www.instagram.com/user4/"
        required: true
        type: string

      max_posts:
        description: "Maximum recent posts to scan per user"
        required: false
        default: "50"
        type: string

      output_type:
        description: "Type of URL to save"
        required: false
        default: "permalink"
        type: choice
        options:
          - permalink
          - direct
          - both

jobs:
  scrape:
    name: Extract Instagram video URLs
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip
          pip install --upgrade instaloader

      - name: Extract Instagram video URLs for multiple users
        shell: bash
        env:
          RAW_USERNAMES: ${{ inputs.usernames }}
          MAX_POSTS: ${{ inputs.max_posts }}
          OUTPUT_TYPE: ${{ inputs.output_type }}

          # Recommended authentication method:
          # Base64 of your local Instaloader session file.
          INSTAGRAM_SESSION_BASE64: ${{ secrets.INSTAGRAM_SESSION_BASE64 }}
          INSTAGRAM_SESSION_USERNAME: ${{ secrets.INSTAGRAM_SESSION_USERNAME }}

          # Fallback authentication method.
          # This can fail if Instagram asks for 2FA/challenge verification.
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
        run: |
          set -euo pipefail

          mkdir -p outputs

          cat > scrape_instagram.py <<'PY'
          import base64
          import os
          import re
          import sys
          import time
          from pathlib import Path

          import instaloader
          from instaloader.exceptions import (
              BadCredentialsException,
              ConnectionException,
              LoginRequiredException,
              PrivateProfileNotFollowedException,
              ProfileNotExistsException,
              QueryReturnedNotFoundException,
              TwoFactorAuthRequiredException,
          )


          def normalize_username(raw: str) -> str:
              """
              Convert supported input formats into a clean Instagram username.

              Supported:
              - username
              - @username
              - https://www.instagram.com/username/
              - https://instagram.com/username/?hl=en
              """
              value = raw.strip()

              value = re.sub(
                  r"^https?://(www\.)?instagram\.com/",
                  "",
                  value,
                  flags=re.IGNORECASE,
              )

              value = value.lstrip("@")
              value = re.split(r"[/?#]", value)[0]
              value = value.strip()

              return value


          def make_post_permalink(shortcode: str) -> str:
              """
              Instagram post/reel URLs are both accessible through /p/{shortcode}/.
              This is more stable than trying to guess /reel/ versus /p/.
              """
              return f"https://www.instagram.com/p/{shortcode}/"


          def safe_get_direct_video_url(post):
              """
              Direct CDN video URLs may expire and may require authentication.
              Therefore this is optional and wrapped safely.
              """
              try:
                  return post.video_url
              except Exception:
                  return None


          def login_if_possible(loader: instaloader.Instaloader) -> bool:
              """
              Prefer a saved Instaloader session over username/password login.

              Why?
              GitHub Actions is a non-browser environment. Instagram may block
              fresh username/password logins with 2FA, challenge checks, or rate limits.
              A pre-created session file is usually more reliable.
              """
              session_b64 = os.getenv("INSTAGRAM_SESSION_BASE64", "").strip()
              session_username = os.getenv("INSTAGRAM_SESSION_USERNAME", "").strip()

              instagram_username = os.getenv("INSTAGRAM_USERNAME", "").strip()
              instagram_password = os.getenv("INSTAGRAM_PASSWORD", "").strip()

              if session_b64 and session_username:
                  session_path = Path(".instaloader-session")
                  session_path.write_bytes(base64.b64decode(session_b64))

                  loader.load_session_from_file(
                      username=session_username,
                      filename=str(session_path),
                  )

                  print(f"Loaded Instagram session for: {session_username}")
                  return True

              if instagram_username and instagram_password:
                  print(f"Trying username/password login for: {instagram_username}")

                  try:
                      loader.login(instagram_username, instagram_password)
                      print("Instagram login succeeded.")
                      return True
                  except TwoFactorAuthRequiredException:
                      print(
                          "Instagram login failed: two-factor authentication is required. "
                          "Use INSTAGRAM_SESSION_BASE64 instead."
                      )
                      return False
                  except BadCredentialsException:
                      print("Instagram login failed: bad username or password.")
                      return False
                  except Exception as exc:
                      print(f"Instagram login failed: {exc}")
                      return False

              print(
                  "No Instagram authentication provided. "
                  "Continuing anonymously. This may fail or return limited results."
              )
              return False


          def write_video_line(handle, output_type: str, permalink: str, direct_url: str | None):
              """
              Write output in a predictable format.

              permalink:
                One stable Instagram post URL per line.

              direct:
                One direct CDN video URL per line when available.

              both:
                TSV format: permalink<TAB>direct_url
              """
              if output_type == "permalink":
                  handle.write(permalink + "\n")

              elif output_type == "direct":
                  if direct_url:
                      handle.write(direct_url + "\n")

              elif output_type == "both":
                  handle.write(f"{permalink}\t{direct_url or ''}\n")

              else:
                  raise ValueError(f"Unsupported output_type: {output_type}")


          def scrape_user(loader: instaloader.Instaloader, username: str, max_posts: int, output_type: str) -> int:
              output_file = Path("outputs") / f"{username}_instagram_video_urls.txt"

              print("----------------------------------------")
              print(f"Processing Instagram user: {username}")
              print(f"Output file: {output_file}")
              print(f"Max posts to scan: {max_posts}")
              print(f"Output type: {output_type}")

              video_count = 0
              scanned_count = 0
              seen_lines = set()

              try:
                  profile = instaloader.Profile.from_username(loader.context, username)

                  with output_file.open("w", encoding="utf-8") as handle:
                      for post in profile.get_posts():
                          scanned_count += 1

                          if scanned_count > max_posts:
                              break

                          permalink = make_post_permalink(post.shortcode)

                          # Normal single video/reel post.
                          if post.is_video:
                              direct_url = safe_get_direct_video_url(post)

                              before = handle.tell()
                              write_video_line(handle, output_type, permalink, direct_url)
                              after = handle.tell()

                              if after > before:
                                  video_count += 1

                          # Carousel posts can contain one or more videos.
                          if post.typename == "GraphSidecar":
                              try:
                                  for index, node in enumerate(post.get_sidecar_nodes(), start=1):
                                      if not getattr(node, "is_video", False):
                                          continue

                                      sidecar_permalink = f"{permalink}?img_index={index}"
                                      direct_url = getattr(node, "video_url", None)

                                      line_key = (sidecar_permalink, direct_url or "")
                                      if line_key in seen_lines:
                                          continue
                                      seen_lines.add(line_key)

                                      before = handle.tell()
                                      write_video_line(
                                          handle,
                                          output_type,
                                          sidecar_permalink,
                                          direct_url,
                                      )
                                      after = handle.tell()

                                      if after > before:
                                          video_count += 1

                              except Exception as exc:
                                  print(f"Warning: could not inspect sidecar post {post.shortcode}: {exc}")

                  print(f"Finished {username}: scanned {scanned_count} posts, found {video_count} videos.")

                  return video_count

              except ProfileNotExistsException:
                  print(f"Error: profile does not exist: {username}")
                  return -1

              except PrivateProfileNotFollowedException:
                  print(f"Error: profile is private and the authenticated account does not follow it: {username}")
                  return -1

              except LoginRequiredException:
                  print(f"Error: login is required to access this profile: {username}")
                  return -1

              except QueryReturnedNotFoundException:
                  print(f"Error: Instagram returned not found for: {username}")
                  return -1

              except ConnectionException as exc:
                  print(f"Error: Instagram connection/query error for {username}: {exc}")
                  return -1

              except Exception as exc:
                  print(f"Unexpected error while processing {username}: {exc}")
                  return -1


          def main() -> int:
              raw_usernames = os.getenv("RAW_USERNAMES", "")
              output_type = os.getenv("OUTPUT_TYPE", "permalink").strip().lower()

              try:
                  max_posts = int(os.getenv("MAX_POSTS", "50"))
              except ValueError:
                  print("MAX_POSTS must be a number.")
                  return 1

              if max_posts <= 0:
                  print("MAX_POSTS must be greater than zero.")
                  return 1

              if output_type not in {"permalink", "direct", "both"}:
                  print("OUTPUT_TYPE must be one of: permalink, direct, both")
                  return 1

              usernames = [
                  normalize_username(item)
                  for item in raw_usernames.split(",")
                  if normalize_username(item)
              ]

              if not usernames:
                  print("No valid usernames were provided.")
                  return 1

              loader = instaloader.Instaloader(
                  download_pictures=False,
                  download_videos=False,
                  download_video_thumbnails=False,
                  download_geotags=False,
                  download_comments=False,
                  save_metadata=False,
                  compress_json=False,
                  quiet=True,
              )

              login_if_possible(loader)

              successful_profiles = 0
              failed_profiles = 0
              total_videos = 0

              for username in usernames:
                  result = scrape_user(loader, username, max_posts, output_type)

                  if result >= 0:
                      successful_profiles += 1
                      total_videos += result
                  else:
                      failed_profiles += 1

                  # Small delay to reduce the chance of rate-limiting.
                  time.sleep(3)

              print("----------------------------------------")
              print(f"Successful profiles: {successful_profiles}")
              print(f"Failed profiles: {failed_profiles}")
              print(f"Total videos found: {total_videos}")

              if successful_profiles == 0:
                  print("Error: no profiles were processed successfully.")
                  return 1

              return 0


          if __name__ == "__main__":
              sys.exit(main())
          PY

          python scrape_instagram.py

      - name: Commit and push output files
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d outputs ]; then
            echo "No outputs directory found."
            exit 0
          fi

          if ! ls outputs/*.txt >/dev/null 2>&1; then
            echo "No output files found."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add outputs/*.txt

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Add Instagram video URLs for multiple users"
          git push

      - name: Upload output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: instagram-video-urls
          path: outputs/*.txt
          retention-days: 7
